<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>{{block "title" .}}{{.Config.Title}}{{end}}</title>
  </head>
  <body>
      <header>
          <nav>
              <a href="/">Home</a>
              {{range .Sections}}
              <a href="/{{.Name}}/">{{.Title}}</a>
              {{end}}
          </nav>
      </header>
      <main>
          {{block "content" .}}{{end}}
      </main>
      <footer>
          <a href="/feed.xml">RSS</a>
      </footer>
  </body>
  </html>
