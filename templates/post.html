{{template "base.html" .}}

{{define "title"}}{{.Title}} — My Blog{{end}}

{{define "content"}}
<article>
    <h1>{{.Title}}</h1>
    <time datetime="{{.DateStr}}">{{.DateStr}}</time>
    {{if .Tags}}
    <ul>
        {{range .Tags}}<li>{{.}}</li>{{end}}
    </ul>
    {{end}}
    <div>{{.HTMLBody}}</div>
</article>
{{end}}
