{{template "base.html" .}}

{{define "content"}}
<h1>{{.Config.Title}}</h1>

{{if .Config.Description}}
<p>{{.Config.Description}}</p>
{{end}}

<ul>
    {{range .Posts}}
    <li>
        <a href="{{.URL}}">{{.Title}}</a>
        <time datetime="{{.Date.Format "2006-01-02"}}">{{.Date.Format "January 2, 2006"}}</time>
    </li>
    {{end}}
</ul>
{{end}}
